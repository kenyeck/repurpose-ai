version: '3.9'
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    command: npm run dev

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FRONTEND_URL=http://localhost:3000
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=your-very-long-secret
      - GOOGLE_CLIENT_ID=...
      - GOOGLE_CLIENT_SECRET=...
    volumes:
      - ./backend:/app
    command: npm run dev

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=sk-...
      - SERPER_API_KEY=...     # optional
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./ai-service:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload